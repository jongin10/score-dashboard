<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과목별 성적 분석 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .input-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.95em;
        }

        .input-group input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .stat-item.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-item.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
        }

        .analysis-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .analysis-section h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .analysis-item {
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            background: #f8f9ff;
            border-radius: 5px;
        }

        .analysis-item.strength {
            border-left-color: #4caf50;
            background: #f1f8f5;
        }

        .analysis-item.weakness {
            border-left-color: #f44336;
            background: #fef5f5;
        }

        .analysis-item h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        .analysis-item p {
            color: #666;
            font-size: 0.95em;
        }

        .emoji {
            font-size: 1.2em;
            margin-right: 5px;
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .input-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 과목별 성적 분석 대시보드</h1>
            <p>모든 과목의 성적을 입력하고 한눈에 분석해보세요</p>
        </div>

        <div class="input-section">
            <div class="input-grid">
                <div class="input-group">
                    <label for="korean">국어</label>
                    <input type="number" id="korean" min="0" max="100" placeholder="0~100">
                </div>
                <div class="input-group">
                    <label for="math">수학</label>
                    <input type="number" id="math" min="0" max="100" placeholder="0~100">
                </div>
                <div class="input-group">
                    <label for="social">사회</label>
                    <input type="number" id="social" min="0" max="100" placeholder="0~100">
                </div>
                <div class="input-group">
                    <label for="science">과학</label>
                    <input type="number" id="science" min="0" max="100" placeholder="0~100">
                </div>
                <div class="input-group">
                    <label for="english">영어</label>
                    <input type="number" id="english" min="0" max="100" placeholder="0~100">
                </div>
                <div class="input-group">
                    <label for="history">한국사</label>
                    <input type="number" id="history" min="0" max="100" placeholder="0~100">
                </div>
            </div>
            <div class="button-group">
                <button class="btn-submit" onclick="updateDashboard()">📊 점수 분석하기</button>
                <button class="btn-reset" onclick="resetScores()">🔄 초기화</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2>📈 점수 분포</h2>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>📊 과목별 비교</h2>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>📌 주요 통계</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">전체 평균</div>
                        <div class="stat-value" id="avgScore">-</div>
                    </div>
                    <div class="stat-item success">
                        <div class="stat-label">최고 점수</div>
                        <div class="stat-value" id="maxScore">-</div>
                    </div>
                    <div class="stat-item warning">
                        <div class="stat-label">최저 점수</div>
                        <div class="stat-value" id="minScore">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">점수 편차</div>
                        <div class="stat-value" id="rangeScore">-</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="analysis-section">
            <h2>💡 성적 분석 및 조언</h2>
            <div id="analysisContent" class="no-data">
                점수를 입력하고 '점수 분석하기' 버튼을 클릭하세요
            </div>
        </div>
    </div>

    <script>
        let radarChart = null;
        let barChart = null;

        const subjects = {
            korean: '국어',
            math: '수학',
            social: '사회',
            science: '과학',
            english: '영어',
            history: '한국사'
        };

        function getScores() {
            return {
                korean: parseFloat(document.getElementById('korean').value) || 0,
                math: parseFloat(document.getElementById('math').value) || 0,
                social: parseFloat(document.getElementById('social').value) || 0,
                science: parseFloat(document.getElementById('science').value) || 0,
                english: parseFloat(document.getElementById('english').value) || 0,
                history: parseFloat(document.getElementById('history').value) || 0
            };
        }

        function updateDashboard() {
            const scores = getScores();
            const values = Object.values(scores);
            const labels = Object.values(subjects);

            if (values.every(v => v === 0)) {
                alert('최소 하나 이상의 점수를 입력해주세요!');
                return;
            }

            updateRadarChart(labels, values);
            updateBarChart(labels, values);
            updateStats(scores, values);
            updateAnalysis(scores, values);
        }

        function updateRadarChart(labels, data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            if (radarChart) {
                radarChart.destroy();
            }

            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '점수',
                        data: data,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.2)',
                        borderWidth: 3,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function updateBarChart(labels, data) {
            const ctx = document.getElementById('barChart').getContext('2d');
            
            if (barChart) {
                barChart.destroy();
            }

            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe'];

            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '점수',
                        data: data,
                        backgroundColor: colors,
                        borderRadius: 10,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function updateStats(scores, values) {
            const avg = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1);
            const max = Math.max(...values);
            const min = Math.min(...values);
            const range = max - min;

            document.getElementById('avgScore').textContent = avg;
            document.getElementById('maxScore').textContent = max;
            document.getElementById('minScore').textContent = min;
            document.getElementById('rangeScore').textContent = range;
        }

        function updateAnalysis(scores, values) {
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            const sorted = Object.entries(scores)
                .map(([key, value]) => ({ subject: subjects[key], score: value }))
                .sort((a, b) => b.score - a.score);

            let html = '';

            // 평균 분석
            if (avg >= 90) {
                html += '<div class="analysis-item strength"><span class="emoji">🌟</span><h3>탁월한 성적!</h3><p>전체 평균이 90점 이상으로 매우 우수합니다. 현재 수준을 유지하고 약간의 보완만으로 완벽한 학생이 될 수 있습니다.</p></div>';
            } else if (avg >= 80) {
                html += '<div class="analysis-item strength"><span class="emoji">👍</span><h3>우수한 성적</h3><p>전체 평균이 80점 이상으로 좋습니다. 조금 더 노력하면 90점대에 도달할 수 있습니다.</p></div>';
            } else if (avg >= 70) {
                html += '<div class="analysis-item"><span class="emoji">📚</span><h3>평범한 성적</h3><p>전체 평균이 70점대입니다. 각 과목의 약점을 보완하면 더 좋은 성적을 얻을 수 있습니다.</p></div>';
            } else {
                html += '<div class="analysis-item weakness"><span class="emoji">⚠️</span><h3>개선 필요</h3><p>전체 평균이 70점 미만입니다. 각 과목별 학습 계획을 세우고 체계적으로 공부하면 성적 향상을 기대할 수 있습니다.</p></div>';
            }

            // 강점 분석
            html += '<div class="analysis-item strength"><span class="emoji">✅</span><h3>강점 과목</h3><p>';
            sorted.slice(0, 2).forEach(item => {
                html += `<strong>${item.subject}</strong> (${item.score}점) `;
            });
            html += '<br>이 과목들을 잘하고 있습니다. 계속 유지하면서 다른 과목의 좋은 공부 방법을 참고해보세요.</p></div>';

            // 약점 분석
            html += '<div class="analysis-item weakness"><span class="emoji">🎯</span><h3>개선 필요 과목</h3><p>';
            sorted.slice(-2).forEach(item => {
                html += `<strong>${item.subject}</strong> (${item.score}점) `;
            });
            html += '<br>이 과목들의 점수가 낮습니다. 추가 학습 시간을 할애하고, 약한 부분을 집중적으로 학습해보세요.</p></div>';

            // 편차 분석
            const range = Math.max(...values) - Math.min(...values);
            if (range > 30) {
                html += '<div class="analysis-item"><span class="emoji">⚡</span><h3>편차가 큼</h3><p>과목별 점수 편차가 ' + range + '점으로 큽니다. 약한 과목을 집중적으로 공부하여 전체 균형을 맞춰보세요.</p></div>';
            } else {
                html += '<div class="analysis-item strength"><span class="emoji">⚖️</span><h3>균형잡힌 성적</h3><p>과목별 점수 편차가 ' + range + '점으로 적당합니다. 전체적으로 균형있는 학습을 하고 있습니다.</p></div>';
            }

            document.getElementById('analysisContent').innerHTML = html;
        }

        function resetScores() {
            Object.keys(subjects).forEach(key => {
                document.getElementById(key).value = '';
            });
            document.getElementById('avgScore').textContent = '-';
            document.getElementById('maxScore').textContent = '-';
            document.getElementById('minScore').textContent = '-';
            document.getElementById('rangeScore').textContent = '-';
            document.getElementById('analysisContent').innerHTML = '점수를 입력하고 \'점수 분석하기\' 버튼을 클릭하세요';
            
            if (radarChart) radarChart.destroy();
            if (barChart) barChart.destroy();
        }

        // 엔터 키로도 분석하기 가능
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                updateDashboard();
            }
        });
    </script>
</body>
</html>
