<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과목별 성적 추이 분석 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            background: white;
            color: #667eea;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .semester-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.95em;
        }

        .input-group input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .stat-item.improvement {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }

        .stat-item.decline {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
        }

        .analysis-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .analysis-section h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .analysis-item {
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            background: #f8f9ff;
            border-radius: 5px;
        }

        .analysis-item.improvement {
            border-left-color: #4caf50;
            background: #f1f8f5;
        }

        .analysis-item.decline {
            border-left-color: #f44336;
            background: #fef5f5;
        }

        .analysis-item.stable {
            border-left-color: #2196f3;
            background: #f0f7ff;
        }

        .analysis-item h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        .analysis-item p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .emoji {
            font-size: 1.2em;
            margin-right: 5px;
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .comparison-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .comparison-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .comparison-table tr:hover {
            background: #f5f5f5;
        }

        .change-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .change-badge.up {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .change-badge.down {
            background: #ffcdd2;
            color: #c62828;
        }

        .change-badge.stable {
            background: #e3f2fd;
            color: #1565c0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .input-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 과목별 성적 추이 분석 대시보드</h1>
            <p>1학기와 2학기 성적을 비교하고 성장을 추적하세요</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('input')">📝 성적 입력</button>
            <button class="tab-btn" onclick="switchTab('analysis')">📊 성적 분석</button>
        </div>

        <!-- 입력 탭 -->
        <div id="input" class="tab-content active">
            <div class="input-section">
                <div class="semester-title">1학기 성적</div>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="korean1">국어</label>
                        <input type="number" id="korean1" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="math1">수학</label>
                        <input type="number" id="math1" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="social1">사회</label>
                        <input type="number" id="social1" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="science1">과학</label>
                        <input type="number" id="science1" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="english1">영어</label>
                        <input type="number" id="english1" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="history1">한국사</label>
                        <input type="number" id="history1" min="0" max="100" placeholder="0~100">
                    </div>
                </div>
            </div>

            <div class="input-section">
                <div class="semester-title">2학기 성적</div>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="korean2">국어</label>
                        <input type="number" id="korean2" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="math2">수학</label>
                        <input type="number" id="math2" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="social2">사회</label>
                        <input type="number" id="social2" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="science2">과학</label>
                        <input type="number" id="science2" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="english2">영어</label>
                        <input type="number" id="english2" min="0" max="100" placeholder="0~100">
                    </div>
                    <div class="input-group">
                        <label for="history2">한국사</label>
                        <input type="number" id="history2" min="0" max="100" placeholder="0~100">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-submit" onclick="analyzeScores()">📊 성적 분석하기</button>
                    <button class="btn-reset" onclick="resetAllScores()">🔄 초기화</button>
                </div>
            </div>
        </div>

        <!-- 분석 탭 -->
        <div id="analysis" class="tab-content">
            <div class="dashboard">
                <div class="card">
                    <h2>📈 성적 추이</h2>
                    <div class="chart-container">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h2>📊 1학기 vs 2학기</h2>
                    <div class="chart-container">
                        <canvas id="comparisonChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h2>📌 성적 변화</h2>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">1학기 평균</div>
                            <div class="stat-value" id="avg1">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">2학기 평균</div>
                            <div class="stat-value" id="avg2">-</div>
                        </div>
                        <div class="stat-item improvement" id="changeItem">
                            <div class="stat-label">평균 변화</div>
                            <div class="stat-value" id="avgChange">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">최대 상승</div>
                            <div class="stat-value" id="maxUp">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-bottom: 30px;">
                <h2>📋 과목별 성적 비교</h2>
                <table class="comparison-table">
                    <thead>
                        <tr>
                            <th>과목</th>
                            <th>1학기</th>
                            <th>2학기</th>
                            <th>변화</th>
                            <th>평가</th>
                        </tr>
                    </thead>
                    <tbody id="comparisonBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #999;">성적을 입력하고 분석하기를 클릭하세요</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="analysis-section">
                <h2>💡 성적 분석 및 피드백</h2>
                <div id="analysisContent" class="no-data">
                    성적을 입력하고 '성적 분석하기' 버튼을 클릭하세요
                </div>
            </div>
        </div>
    </div>

    <script>
        let lineChart = null;
        let comparisonChart = null;

        const subjects = {
            korean: '국어',
            math: '수학',
            social: '사회',
            science: '과학',
            english: '영어',
            history: '한국사'
        };

        function switchTab(tabName) {
            // 모든 탭 숨기기
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 선택한 탭 표시
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function getScores(semester) {
            const suffix = semester === 1 ? '1' : '2';
            return {
                korean: parseFloat(document.getElementById('korean' + suffix).value) || 0,
                math: parseFloat(document.getElementById('math' + suffix).value) || 0,
                social: parseFloat(document.getElementById('social' + suffix).value) || 0,
                science: parseFloat(document.getElementById('science' + suffix).value) || 0,
                english: parseFloat(document.getElementById('english' + suffix).value) || 0,
                history: parseFloat(document.getElementById('history' + suffix).value) || 0
            };
        }

        function analyzeScores() {
            const scores1 = getScores(1);
            const scores2 = getScores(2);
            const values1 = Object.values(scores1);
            const values2 = Object.values(scores2);
            const labels = Object.values(subjects);

            if (values1.every(v => v === 0) || values2.every(v => v === 0)) {
                alert('1학기와 2학기 성적을 모두 입력해주세요!');
                return;
            }

            updateCharts(labels, values1, values2);
            updateStats(scores1, scores2, values1, values2);
            updateComparisonTable(scores1, scores2);
            updateAnalysis(scores1, scores2, values1, values2);

            // 분석 탭으로 자동 전환
            document.getElementById('analysis').classList.add('active');
            document.getElementById('input').classList.remove('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.remove('active');
        }

        function updateCharts(labels, data1, data2) {
            // 라인 차트 (추이)
            const lineCtx = document.getElementById('lineChart').getContext('2d');
            
            if (lineChart) {
                lineChart.destroy();
            }

            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '1학기',
                            data: data1,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#667eea',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            tension: 0.4
                        },
                        {
                            label: '2학기',
                            data: data2,
                            borderColor: '#f5576c',
                            backgroundColor: 'rgba(245, 87, 108, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#f5576c',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true
                        }
                    }
                }
            });

            // 비교 차트
            const comparisonCtx = document.getElementById('comparisonChart').getContext('2d');
            
            if (comparisonChart) {
                comparisonChart.destroy();
            }

            comparisonChart = new Chart(comparisonCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '1학기',
                            data: data1,
                            backgroundColor: '#667eea',
                            borderRadius: 8
                        },
                        {
                            label: '2학기',
                            data: data2,
                            backgroundColor: '#f5576c',
                            borderRadius: 8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20
                            }
                        }
                    }
                }
            });
        }

        function updateStats(scores1, scores2, values1, values2) {
            const avg1 = (values1.reduce((a, b) => a + b, 0) / values1.length).toFixed(1);
            const avg2 = (values2.reduce((a, b) => a + b, 0) / values2.length).toFixed(1);
            const avgChange = (avg2 - avg1).toFixed(1);
            
            // 과목별 변화 계산
            const changes = Object.keys(scores1).map(key => scores2[key] - scores1[key]);
            const maxUp = Math.max(...changes);
            
            document.getElementById('avg1').textContent = avg1;
            document.getElementById('avg2').textContent = avg2;
            document.getElementById('avgChange').textContent = avgChange > 0 ? '+' + avgChange : avgChange;
            document.getElementById('maxUp').textContent = maxUp > 0 ? '+' + maxUp : maxUp;

            // 변화 배지 색상 변경
            const changeItem = document.getElementById('changeItem');
            if (avgChange > 0) {
                changeItem.className = 'stat-item improvement';
            } else if (avgChange < 0) {
                changeItem.className = 'stat-item decline';
            } else {
                changeItem.className = 'stat-item';
            }
        }

        function updateComparisonTable(scores1, scores2) {
            let html = '';
            const subjects_list = Object.keys(scores1);

            subjects_list.forEach(key => {
                const score1 = scores1[key];
                const score2 = scores2[key];
                const change = score2 - score1;

                let badgeClass = 'stable';
                let changeText = '유지';
                let emoji = '→';

                if (change > 0) {
                    badgeClass = 'up';
                    changeText = '+' + change;
                    emoji = '📈';
                } else if (change < 0) {
                    badgeClass = 'down';
                    changeText = change;
                    emoji = '📉';
                }

                html += `
                    <tr>
                        <td><strong>${subjects[key]}</strong></td>
                        <td>${score1}점</td>
                        <td>${score2}점</td>
                        <td><span class="change-badge ${badgeClass}">${emoji} ${changeText}</span></td>
                        <td>${score2 >= 90 ? '⭐' : score2 >= 80 ? '👍' : score2 >= 70 ? '📚' : '⚠️'}</td>
                    </tr>
                `;
            });

            document.getElementById('comparisonBody').innerHTML = html;
        }

        function updateAnalysis(scores1, scores2, values1, values2) {
            const avg1 = values1.reduce((a, b) => a + b, 0) / values1.length;
            const avg2 = values2.reduce((a, b) => a + b, 0) / values2.length;
            const avgChange = avg2 - avg1;

            const sorted1 = Object.entries(scores1)
                .map(([key, value]) => ({ subject: subjects[key], score: value, key: key }))
                .sort((a, b) => b.score - a.score);

            const sorted2 = Object.entries(scores2)
                .map(([key, value]) => ({ subject: subjects[key], score: value, key: key }))
                .sort((a, b) => b.score - a.score);

            let html = '';

            // 전체 평균 변화 분석
            if (avgChange > 5) {
                html += '<div class="analysis-item improvement"><span class="emoji">🚀</span><h3>눈에 띄는 성장!</h3><p>전체 평균이 ' + Math.abs(avgChange).toFixed(1) + '점 상승했습니다. 이는 매우 긍정적인 신호입니다. 지난 학기의 노력이 성과를 냈습니다! 계속 유지해보세요.</p></div>';
            } else if (avgChange > 0) {
                html += '<div class="analysis-item improvement"><span class="emoji">👍</span><h3>성적 향상</h3><p>전체 평균이 ' + avgChange.toFixed(1) + '점 상승했습니다. 꾸준한 노력이 결실을 맺고 있습니다.</p></div>';
            } else if (avgChange > -5) {
                html += '<div class="analysis-item stable"><span class="emoji">→</span><h3>안정적인 성적</h3><p>전체 평균이 ' + Math.abs(avgChange).toFixed(1) + '점 하락했습니다. 큰 변화는 없지만 일부 과목의 개선을 통해 더 좋은 성적을 기대할 수 있습니다.</p></div>';
            } else {
                html += '<div class="analysis-item decline"><span class="emoji">⚠️</span><h3>성적 하락 주의</h3><p>전체 평균이 ' + Math.abs(avgChange).toFixed(1) + '점 하락했습니다. 어떤 과목에서 특히 점수가 떨어졌는지 확인하고 학습 전략을 수정해야 할 시기입니다.</p></div>';
            }

            // 상승한 과목 분석
            const risingSubjects = Object.keys(scores1).filter(key => scores2[key] > scores1[key]);
            const fallingSubjects = Object.keys(scores1).filter(key => scores2[key] < scores1[key]);

            if (risingSubjects.length > 0) {
                html += '<div class="analysis-item improvement"><span class="emoji">✅</span><h3>성적이 오른 과목</h3><p>';
                risingSubjects.forEach(key => {
                    const rise = scores2[key] - scores1[key];
                    html += `<strong>${subjects[key]}</strong> (+${rise}점) `;
                });
                html += '<br>이 과목들에서 좋은 성과를 보였습니다. 같은 학습 방법을 유지하세요.</p></div>';
            }

            // 하락한 과목 분석
            if (fallingSubjects.length > 0) {
                html += '<div class="analysis-item decline"><span class="emoji">🎯</span><h3>성적이 내려간 과목</h3><p>';
                fallingSubjects.forEach(key => {
                    const fall = Math.abs(scores2[key] - scores1[key]);
                    html += `<strong>${subjects[key]}</strong> (-${fall}점) `;
                });
                html += '<br>이 과목들의 점수가 떨어졌습니다. 어떤 부분이 약해졌는지 분석하고 집중적으로 공부해야 합니다.</p></div>';
            }

            // 현재 강점 과목
            html += '<div class="analysis-item"><span class="emoji">⭐</span><h3>현재 강점 과목 (2학기)</h3><p>';
            sorted2.slice(0, 2).forEach(item => {
                html += `<strong>${item.subject}</strong> (${item.score}점) `;
            });
            html += '<br>이 과목들을 계속 잘 유지하면서 다른 과목의 수준을 높여보세요.</p></div>';

            // 집중 필요 과목
            html += '<div class="analysis-item decline"><span class="emoji">📚</span><h3>집중이 필요한 과목 (2학기)</h3><p>';
            sorted2.slice(-2).forEach(item => {
                html += `<strong>${item.subject}</strong> (${item.score}점) `;
            });
            html += '<br>이 과목들의 점수를 높이기 위해 추가 학습 시간을 할애하세요.</p></div>';

            // 전체 조언
            const improvementRate = risingSubjects.length;
            if (improvementRate >= 4) {
                html += '<div class="analysis-item improvement"><span class="emoji">🌟</span><h3>종합 평가</h3><p>4개 이상의 과목에서 성적이 상승했습니다. 매우 긍정적인 추세입니다. 현재의 학습 방식이 잘 맞고 있으며, 이를 계속 유지하면 더욱 좋은 결과를 기대할 수 있습니다.</p></div>';
            } else if (improvementRate >= 2) {
                html += '<div class="analysis-item"><span class="emoji">💪</span><h3>종합 평가</h3><p>2개 이상의 과목에서 성적이 향상되었습니다. 긍정적인 방향으로 나아가고 있습니다. 하락한 과목들도 개선하면 전체 성적이 크게 향상될 것입니다.</p></div>';
            } else if (improvementRate > 0) {
                html += '<div class="analysis-item stable"><span class="emoji">🔄</span><h3>종합 평가</h3><p>일부 과목은 향상되었으나 여러 과목에서 점수가 하락했습니다. 전체적인 학습 방식을 점검하고 어떤 부분이 문제인지 파악해보세요.</p></div>';
            } else {
                html += '<div class="analysis-item decline"><span class="emoji">⚡</span><h3>종합 평가</h3><p>모든 과목에서 성적이 하락했습니다. 학습 방식의 전반적인 개선이 필요합니다. 각 과목별로 약한 부분을 파악하고 체계적인 학습 계획을 세워보세요.</p></div>';
            }

            document.getElementById('analysisContent').innerHTML = html;
        }

        function resetAllScores() {
            Object.keys(subjects).forEach(key => {
                document.getElementById(key + '1').value = '';
                document.getElementById(key + '2').value = '';
            });
            document.getElementById('avg1').textContent = '-';
            document.getElementById('avg2').textContent = '-';
            document.getElementById('avgChange').textContent = '-';
            document.getElementById('maxUp').textContent = '-';
            document.getElementById('comparisonBody').innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">성적을 입력하고 분석하기를 클릭하세요</td></tr>';
            document.getElementById('analysisContent').innerHTML = '성적을 입력하고 \'성적 분석하기\' 버튼을 클릭하세요';
            
            if (lineChart) lineChart.destroy();
            if (comparisonChart) comparisonChart.destroy();
        }

        // 엔터 키로도 분석하기 가능
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                analyzeScores();
            }
        });
    </script>
</body>
</html>
